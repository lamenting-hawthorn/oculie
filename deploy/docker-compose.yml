version: "3.9"

# OpenClaw Weather Market Trader — VPS Docker Compose
#
# Usage:
#   cp .env.example .env && nano .env   # fill in API keys
#   docker compose -f deploy/docker-compose.yml up -d
#   docker compose -f deploy/docker-compose.yml logs -f
#
# The frontend is built at startup and served as static files by nginx.
# The API runs on port 8000 (internal); nginx proxies /api/* to it.

services:

  # ── Trading bot ────────────────────────────────────────────────────────────
  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.bot
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - data:/app/data
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.bot
    restart: unless-stopped
    env_file: ../.env
    command: >
      uv run uvicorn dashboard.backend.app:app
      --host 0.0.0.0
      --port 8000
      --workers 1
    volumes:
      - data:/app/data
    expose:
      - "8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── React frontend + reverse proxy ────────────────────────────────────────
  nginx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/letsencrypt:ro
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  data:
  certs:
